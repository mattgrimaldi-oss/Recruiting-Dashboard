name: Refresh Pipeline Data

# Pulls fresh funnel data from Greenhouse and commits data.json so the
# dashboard's Pipeline tab stays current without manual CSV imports.
#
# Note: this runs greenhouse_v3.py directly (not refresh_dashboard.py), so the
# Google Calendar screen-count overlay is NOT applied here — that step needs
# Google creds that aren't available in CI. Screen counts come straight from
# Greenhouse stage data.

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC (~3am ET)
  workflow_dispatch:        # Manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Refresh pipeline data
        env:
          # Reuses the existing Harvest v1 secret already configured for the
          # candidate-screening workflow. The script reads it as GREENHOUSE_API_KEY.
          GREENHOUSE_API_KEY: ${{ secrets.GREENHOUSE_API_KEY_V1 }}
        run: python3 greenhouse_v3.py --output data.json

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # No [skip ci] — Vercel honors it and would skip redeploying the
          # refreshed data. This workflow runs on schedule/dispatch only (not
          # push), so there is no CI loop to avoid.
          commit_message: 'chore: refresh pipeline data'
          file_pattern: data.json
