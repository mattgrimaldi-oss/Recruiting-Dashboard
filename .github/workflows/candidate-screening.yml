name: Candidate Screening

on:
  schedule:
    - cron: '0 9 */2 * *'  # Every 2 days at 9am UTC
  workflow_dispatch:
    inputs:
      role:
        description: 'Role key to screen (empty = use cron config / all roles)'
        required: false
        default: ''
      time_window_hours:
        description: 'Time window in hours (empty = use config)'
        required: false
        default: ''

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run candidate screening
        env:
          GREENHOUSE_API_KEY_V1: ${{ secrets.GREENHOUSE_API_KEY_V1 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/run-screening.js "${{ github.event.inputs.role }}" "${{ github.event.inputs.time_window_hours }}"
